<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analysis 1 Number of sets of Excel </title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
        }
        .container {
            background-color: #fff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            width: 100%;
            max-width: 600px;
        }
        h2 {
            margin-top: 0;
            color: #2c3e50;
            border-bottom: 2px solid #ecf0f1;
            padding-bottom: 10px;
        }
        p {
            font-size: 14px;
            color: #7f8c8d;
            line-height: 1.5;
        }
        textarea {
            width: 100%;
            height: 200px;
            padding: 12px;
            border: 1px solid #bdc3c7;
            border-radius: 6px;
            box-sizing: border-box;
            resize: vertical;
            font-family: monospace;
            font-size: 14px;
            margin-top: 10px;
        }
        textarea:focus {
            outline: none;
            border-color: #3498db;
            box-shadow: 0 0 5px rgba(52,152,219,0.3);
        }
        button {
            background-color: #2ecc71;
            color: white;
            border: none;
            padding: 12px 20px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            width: 100%;
            margin-top: 15px;
            transition: background 0.2s;
        }
        button:hover {
            background-color: #27ae60;
        }
        .result-box {
            margin-top: 25px;
            padding: 15px;
            background-color: #e8f8f5;
            border-left: 5px solid #2ecc71;
            border-radius: 4px;
            display: none;
        }
        .result-title {
            font-weight: bold;
            color: #16a085;
            margin-bottom: 5px;
        }
        .result-value {
            font-size: 24px;
            font-weight: bold;
            color: #2c3e50;
        }
    </style>
</head>
<body>

<div class="container">
    <h2> 1 Number of sets 分析器</h2>
    <p><strong>使用說明：</strong><br>請從 Excel 複製一整欄（包含標題），直接貼入下方輸入框中。系統會自動移除第一行的標題，並計算出 1 的集合數量 <code>SUMPRODUCT</code> 的統計結果。</p>
    
    <textarea id="excelData" placeholder="請在此處貼上從 Excel 複製的欄位資料..."></textarea>
    
    <button onclick="calculateResult()">開始分析計算</button>
    
    <div id="resultContainer" class="result-box">
        <div class="result-title">計算結果 (符合條件的次數)：</div>
        <div id="resultValue" class="result-value">0</div>
    </div>
</div>

<script>
function calculateResult() {
    const rawData = document.getElementById('excelData').value;
    
    // 將輸入的資料依換行符號切分成陣列
    let rows = rawData.split(/\r?\n/);
    
    // 移除空白的行（避免尾端有多餘的換行）
    rows = rows.filter(row => row.trim() !== "");
    
    // 移除第一行 (Title/標題)
    if (rows.length > 0) {
        rows.shift();
    }
    
    // 如果移除標題後沒有資料，就顯示 0
    if (rows.length === 0) {
        showResult(0);
        return;
    }
    
    let count = 0;
    
    // 模擬 Excel 的 SUMPRODUCT((A1:An=1)*(A2:An+1<>1))
    // 這裡的 rows 已經是移除標題後的純資料陣列
    for (let i = 0; i < rows.length; i++) {
        const currentVal = rows[i].trim();
        // 取得下一行的值，如果已經是最後一行，下一行視為空字串 "" 
        const nextVal = (i + 1 < rows.length) ? rows[i + 1].trim() : "";
        
        // 條件：目前的值是 "1" 且 下一個值不是 "1"
        if (currentVal === "1" && nextVal !== "1") {
            count++;
        }
    }
    
    showResult(count);
}

function showResult(value) {
    document.getElementById('resultValue').innerText = value;
    document.getElementById('resultContainer').style.display = 'block';
}
</script>

</body>
</html>
