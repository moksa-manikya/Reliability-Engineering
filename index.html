<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>可靠度測試平台 - Reliability Test Portal</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>

  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            background: '#ffffff', foreground: '#0f172a', card: '#ffffff',
            primary: '#0f172a', 'primary-foreground': '#f8fafc',
            secondary: '#f1f5f9', border: '#e2e8f0',
            muted: { DEFAULT: '#f1f5f9', foreground: '#64748b' },
            accent: { DEFAULT: '#f59e0b', foreground: '#0f172a' }
          }
        }
      }
    }
  </script>
</head>
<body class="min-h-screen bg-slate-50/50 text-foreground" style="font-family: 'DM Sans', sans-serif;">

  <div class="h-1 w-full bg-gradient-to-r from-amber-500 via-amber-400 to-blue-500"></div>

  <div class="max-w-6xl mx-auto px-6 py-10">
    <header class="mb-10">
      <div class="flex items-start justify-between gap-6 flex-wrap">
        <div>
          <div class="flex items-center gap-2 mb-3">
            <i data-lucide="circle-dot" class="w-3.5 h-3.5 text-amber-500"></i>
            <span class="text-xs font-medium tracking-widest uppercase text-muted-foreground" style="font-family: 'DM Mono', monospace;">
              Reliability Engineering
            </span>
          </div>
          <h1 class="text-3xl font-bold text-foreground tracking-tight mb-1">可靠度測試平台</h1>
          <p class="text-base text-muted-foreground font-light">Reliability Test Portal — 選擇測試模組以開始作業</p>
        </div>
        <div id="category-filters" class="flex gap-2 flex-wrap items-start justify-end"></div>
      </div>
      <div class="mt-8 border-t border-border"></div>
    </header>

    <div class="flex items-center gap-3 mb-4">
      <div class="relative flex-1 max-w-sm">
        <i data-lucide="search" class="w-3.5 h-3.5 absolute left-3 top-1/2 -translate-y-1/2 text-muted-foreground"></i>
        <input type="text" id="search-input" placeholder="搜尋測試項目..." class="w-full bg-white border border-border rounded-lg pl-9 pr-4 py-2.5 text-sm text-foreground placeholder:text-muted-foreground focus:outline-none focus:ring-2 focus:ring-amber-500/25 focus:border-amber-500/50 transition-all" />
      </div>
    </div>

    <div id="module-count" class="text-xs text-muted-foreground mb-5" style="font-family: 'DM Mono', monospace;"></div>
    <div id="modules-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4"></div>

    <div id="empty-state" class="hidden text-center py-20 text-muted-foreground text-sm">
      <i data-lucide="search" class="mx-auto mb-3 opacity-20 w-8 h-8"></i>
      <p>找不到符合的測試項目</p>
    </div>

    <footer class="mt-14 pt-5 border-t border-border flex items-center justify-between">
      <span id="footer-date" class="text-xs text-muted-foreground/50" style="font-family: 'DM Mono', monospace;">REL Portal v1.0 — </span>
      <div class="flex items-center gap-1.5">
        <i data-lucide="chevron-right" class="w-3 h-3 text-muted-foreground/40"></i>
        <span class="text-xs text-muted-foreground/50" style="font-family: 'DM Mono', monospace;">Reliability Engineering Team</span>
      </div>
    </footer>
  </div>

  <div id="modal-backdrop" class="fixed inset-0 z-50 flex items-center justify-center p-4 hidden" style="background-color: rgba(0,0,0,0.4); backdrop-filter: blur(4px);">
    <div class="bg-white border border-border rounded-2xl w-full max-w-lg shadow-2xl">
      <div class="flex items-center justify-between px-6 pt-6 pb-4 border-b border-border">
        <div>
          <h2 id="modal-title-text" class="text-base font-semibold text-foreground">新增測試模組</h2>
          <p class="text-xs text-muted-foreground mt-0.5">填寫資訊以建立新的報告模板入口</p>
        </div>
        <button onclick="closeModal()" class="w-8 h-8 rounded-lg flex items-center justify-center text-muted-foreground hover:text-foreground hover:bg-secondary transition-colors">
          <i data-lucide="x" class="w-4 h-4"></i>
        </button>
      </div>

      <div class="px-6 py-5 flex flex-col gap-4 max-h-[70vh] overflow-y-auto">
        <div>
          <label class="block text-xs font-medium text-foreground mb-1.5">模組名稱 <span class="text-amber-500">*</span></label>
          <input type="text" id="form-title" placeholder="例：Thermal Shock Test" oninput="handleTitleInput()" class="w-full bg-secondary border border-border rounded-lg px-3 py-2.5 text-sm text-foreground placeholder:text-muted-foreground focus:outline-none focus:ring-2 focus:ring-amber-500/25 focus:border-amber-500/50 transition-all" />
          <p id="error-title" class="text-xs text-red-500 mt-1 hidden"></p>
        </div>

        <div>
          <label class="block text-xs font-medium text-foreground mb-1.5">中文名稱 <span class="text-amber-500">*</span></label>
          <input type="text" id="form-subtitle" placeholder="例：熱衝擊測試" oninput="updatePreview()" class="w-full bg-secondary border border-border rounded-lg px-3 py-2.5 text-sm text-foreground placeholder:text-muted-foreground focus:outline-none focus:ring-2 focus:ring-amber-500/25 focus:border-amber-500/50 transition-all" />
          <p id="error-subtitle" class="text-xs text-red-500 mt-1 hidden"></p>
        </div>

        <div>
          <label class="block text-xs font-medium text-foreground mb-1.5">連結網頁檔名 / 網址 <span class="text-amber-500">*</span></label>
          <input type="text" id="form-url" placeholder="例：ESD.html 或 test-panel.html?slug=thermal" oninput="updatePreview()" class="w-full bg-secondary border border-border rounded-lg px-3 py-2.5 text-sm text-foreground placeholder:text-muted-foreground focus:outline-none focus:ring-2 focus:ring-amber-500/25 focus:border-amber-500/50 transition-all" />
          <p class="text-[11px] text-muted-foreground mt-1">您可以手動輸入自訂的 HTML 檔名（例如：<span class="font-mono text-slate-700">ESD.html</span>）</p>
          <p id="error-url" class="text-xs text-red-500 mt-1 hidden"></p>
        </div>

        <div>
          <label class="block text-xs font-medium text-foreground mb-1.5">說明 <span class="text-amber-500">*</span></label>
          <textarea id="form-description" rows="2" placeholder="簡短描述此測試模組的用途..." oninput="updatePreview()" class="w-full bg-secondary border border-border rounded-lg px-3 py-2.5 text-sm text-foreground placeholder:text-muted-foreground focus:outline-none focus:ring-2 focus:ring-amber-500/25 focus:border-amber-500/50 transition-all resize-none"></textarea>
          <p id="error-description" class="text-xs text-red-500 mt-1 hidden"></p>
        </div>

        <div>
          <label class="block text-xs font-medium text-foreground mb-1.5">分類</label>
          <div id="form-categories" class="flex gap-2 flex-wrap"></div>
        </div>

        <div class="flex gap-4">
          <div class="flex-1">
            <label class="block text-xs font-medium text-foreground mb-1.5">圖示</label>
            <div id="form-icons" class="flex flex-wrap gap-1.5"></div>
          </div>
          <div>
            <label class="block text-xs font-medium text-foreground mb-1.5">顏色</label>
            <div id="form-colors" class="flex flex-wrap gap-1.5 max-w-[120px]"></div>
          </div>
        </div>

        <div class="rounded-xl border border-border bg-slate-50 p-4 flex items-center gap-3">
          <div id="preview-icon-wrapper" class="w-9 h-9 rounded-lg flex items-center justify-center shrink-0">
            <i id="preview-icon" data-lucide="layers" class="w-4 h-4"></i>
          </div>
          <div class="min-w-0 flex-1">
            <p id="preview-title" class="text-sm font-semibold text-foreground truncate">模組名稱</p>
            <p id="preview-subtitle" class="text-xs text-muted-foreground" style="font-family: 'DM Mono', monospace;">中文名稱</p>
          </div>
          <span id="preview-category" class="text-xs px-2 py-0.5 rounded-md border border-border bg-white text-muted-foreground shrink-0" style="font-family: 'DM Mono', monospace;">Electrical</span>
        </div>
      </div>

      <div class="flex gap-3 px-6 pb-6 pt-4 border-t border-border">
        <button onclick="closeModal()" class="flex-1 py-2.5 text-sm font-medium rounded-lg border border-border text-muted-foreground hover:text-foreground hover:bg-secondary transition-colors">取消</button>
        <button id="submit-btn" onclick="handleSubmit()" class="flex-1 py-2.5 text-sm font-medium rounded-lg bg-primary text-primary-foreground hover:opacity-90 transition-opacity">確認儲存</button>
      </div>
    </div>
  </div>

  <script>
    const CATEGORIES = ["All", "Electrical", "Thermal", "Mechanical", "Tools"];
    const ICON_OPTIONS = ["Zap", "Wrench", "Thermometer", "ShieldAlert", "Activity", "Waves", "Wind", "Cpu", "FlaskConical", "BarChart2", "Layers"];
    const COLOR_OPTIONS = ["#f59e0b", "#ef4444", "#3b82f6", "#8b5cf6", "#e85d04", "#10b981", "#06b6d4", "#ec4899", "#84cc16", "#6366f1"];
    const ADMIN_PASSWORD = "admin123";

    // 初始資料中加入了 targetUrl 屬性，用來直接定義點擊卡片後的跳轉目標
    const INITIAL_PAGES = [
      { id: 1, slug: "esd-test", title: "ESD Test", subtitle: "靜電放電測試", description: "HBM、CDM、MM 模型的靜電放電耐受性評估與波形分析", category: "Electrical", iconName: "Zap", color: "#f59e0b", targetUrl: "ESD.html" },
      { id: 2, slug: "rel-item-tool", title: "REL_Item Tool", subtitle: "可靠度項目管理", description: "可靠度測試項目建立、追蹤、結果記錄與報告產出工具", category: "Tools", iconName: "Wrench", color: "#3b82f6", targetUrl: "test-panel.html?slug=rel-item-tool" }
    ];

    let pages = JSON.parse(localStorage.getItem("rel_modules")) || INITIAL_PAGES;
    let query = "";
    let activeCategory = "All";
    
    let modalMode = "add"; 
    let editingId = null;

    const EMPTY_FORM = { title: "", subtitle: "", description: "", category: "Electrical", iconName: "Layers", color: "#3b82f6", targetUrl: "" };
    let form = { ...EMPTY_FORM };

    function slugify(str) {
      return str.toLowerCase().replace(/[^a-z0-9一-鿿]+/g, "-").replace(/^-|-$/g, "");
    }

    document.addEventListener("DOMContentLoaded", () => {
      document.getElementById("footer-date").innerText += new Date().toISOString().split("T")[0];
      document.getElementById("search-input").addEventListener("input", (e) => { query = e.target.value; render(); });
      renderFilters();
      renderFormOptions();
      render();
    });

    function checkAdminAuth(action, targetId = null) {
      const password = prompt("請輸入管理人員密碼以執行此操作：");
      if (password === null) return;
      if (password === ADMIN_PASSWORD) {
        if (action === 'add') {
          openModal('add');
        } else if (action === 'edit') {
          openModal('edit', targetId);
        } else if (action === 'delete') {
          handleDelete(targetId);
        }
      } else {
        alert("密碼錯誤，您沒有權限！");
      }
    }

    function renderFilters() {
      const filterContainer = document.getElementById("category-filters");
      filterContainer.innerHTML = CATEGORIES.filter(c => c !== "All").map(cat => `
        <button id="filter-${cat}" onclick="toggleCategory('${cat}')" class="px-4 py-2 text-sm font-medium rounded-lg border transition-all bg-white text-muted-foreground border-border hover:text-foreground hover:border-foreground/20">
          ${cat}
        </button>
      `).join('');
    }

    function toggleCategory(cat) {
      activeCategory = activeCategory === cat ? "All" : cat;
      CATEGORIES.filter(c => c !== "All").forEach(c => {
        const btn = document.getElementById(`filter-${c}`);
        btn.className = activeCategory === c 
          ? "px-4 py-2 text-sm font-medium rounded-lg border transition-all bg-primary text-primary-foreground border-primary shadow-sm"
          : "px-4 py-2 text-sm font-medium rounded-lg border transition-all bg-white text-muted-foreground border-border hover:text-foreground hover:border-foreground/20";
      });
      render();
    }

    function render() {
      const grid = document.getElementById("modules-grid");
      const countEl = document.getElementById("module-count");
      const emptyState = document.getElementById("empty-state");

      const filtered = pages.filter((p) => {
        const matchCat = activeCategory === "All" || p.category === activeCategory;
        const q = query.toLowerCase();
        return matchCat && (q === "" || p.title.toLowerCase().includes(q) || p.subtitle.toLowerCase().includes(q) || p.description.toLowerCase().includes(q) || p.slug.toLowerCase().includes(q));
      });

      countEl.innerHTML = `顯示 ${filtered.length} / ${pages.length} 個模組 ${activeCategory !== "All" ? `<span class="ml-2 text-amber-500">· ${activeCategory}</span>` : ''}`;
      filtered.length === 0 && pages.length > 0 ? emptyState.classList.remove("hidden") : emptyState.classList.add("hidden");

      let cardsHtml = filtered.map(page => {
        // 讀取設定好的跳轉網頁，若無設定則防呆導向預設控制台
        const finalUrl = page.targetUrl || `test-panel.html?slug=${page.slug}`;

        return `
          <div class="group relative bg-white border border-border rounded-xl p-5 hover:shadow-md hover:border-foreground/15 transition-all duration-200 flex flex-col gap-4">
            
            <div class="absolute top-4 right-4 flex gap-1 opacity-0 group-hover:opacity-100 transition-opacity z-10">
              <button onclick="event.preventDefault(); event.stopPropagation(); checkAdminAuth('edit', ${page.id})" class="p-1.5 rounded-md bg-slate-100 text-slate-600 hover:bg-slate-900 hover:text-white transition-colors" title="修改模組">
                <i data-lucide="edit-2" class="w-3.5 h-3.5"></i>
              </button>
              <button onclick="event.preventDefault(); event.stopPropagation(); checkAdminAuth('delete', ${page.id})" class="p-1.5 rounded-md bg-red-50 text-red-600 hover:bg-red-600 hover:text-white transition-colors" title="刪除模組">
                <i data-lucide="trash-2" class="w-3.5 h-3.5"></i>
              </button>
            </div>

            <a href="${finalUrl}" class="flex flex-col gap-4 flex-1">
              <div class="w-10 h-10 rounded-lg flex items-center justify-center shrink-0" style="background-color: ${page.color}18; color: ${page.color};">
                <i data-lucide="${page.iconName}" class="w-5 h-5"></i>
              </div>
              <div class="flex-1">
                <div class="flex items-center gap-1.5 mb-0.5">
                  <h2 class="font-semibold text-foreground text-base leading-snug group-hover:text-amber-500 transition-colors">${page.title}</h2>
                  <i data-lucide="arrow-up-right" class="w-3.5 h-3.5 text-amber-500 opacity-0 group-hover:opacity-100 -translate-x-0.5 group-hover:translate-x-0 transition-all shrink-0"></i>
                </div>
                <p class="text-xs text-muted-foreground mb-2" style="font-family: 'DM Mono', monospace;">${page.subtitle}</p>
                <p class="text-sm text-muted-foreground leading-relaxed font-light">${page.description}</p>
              </div>
              <div class="flex items-center justify-between pt-3 border-t border-border">
                <span class="text-xs text-muted-foreground/60 truncation max-w-[150px]" style="font-family: 'DM Mono', monospace;" title="${finalUrl}">${finalUrl}</span>
                <span class="text-xs px-2 py-0.5 rounded-md border text-muted-foreground border-border bg-secondary" style="font-family: 'DM Mono', monospace;">${page.category}</span>
              </div>
            </a>
          </div>
        `;
      }).join('');

      cardsHtml += `
        <button onclick="checkAdminAuth('add')" class="group bg-white border border-dashed border-border rounded-xl p-5 hover:border-amber-500/50 hover:bg-amber-500/5 transition-all duration-200 flex flex-col items-center justify-center gap-3 min-h-[180px] text-muted-foreground hover:text-amber-500">
          <div class="w-10 h-10 rounded-lg border border-dashed border-current flex items-center justify-center transition-colors">
            <i data-lucide="plus" class="w-[18px] h-[18px]"></i>
          </div>
          <span class="text-sm font-medium">新增測試模組</span>
        </button>
      `;

      grid.innerHTML = cardsHtml;
      lucide.createIcons();
    }

    // 當輸入模組英文名稱時，自動給予預設的檔名
    function handleTitleInput() {
      const titleValue = document.getElementById("form-title").value;
      const urlInput = document.getElementById("form-url");
      
      // 只有在新增模式，且使用者還沒自己亂改網址欄位時，才貼心自動填入
      if (modalMode === "add") {
        const generatedSlug = slugify(titleValue);
        urlInput.value = generatedSlug ? `${generatedSlug}.html` : "";
      }
      updatePreview();
    }

    function openModal(mode, targetId = null) {
      modalMode = mode;
      clearErrors();

      if (mode === 'edit') {
        editingId = targetId;
        const current = pages.find(p => p.id === targetId);
        form = { ...current };
        document.getElementById("modal-title-text").innerText = "修改測試模組";
        document.getElementById("form-title").value = form.title;
        document.getElementById("form-subtitle").value = form.subtitle;
        document.getElementById("form-url").value = form.targetUrl || "";
        document.getElementById("form-description").value = form.description;
      } else {
        editingId = null;
        form = { ...EMPTY_FORM };
        document.getElementById("modal-title-text").innerText = "新增測試模組";
        document.getElementById("form-title").value = "";
        document.getElementById("form-subtitle").value = "";
        document.getElementById("form-url").value = "";
        document.getElementById("form-description").value = "";
      }

      selectFormCategory(form.category);
      selectFormIcon(form.iconName);
      selectFormColor(form.color);
      updatePreview();
      document.getElementById("modal-backdrop").classList.remove("hidden");
    }

    function closeModal() { document.getElementById("modal-backdrop").classList.add("hidden"); }

    function clearErrors() {
      ['title', 'subtitle', 'url', 'description'].forEach(field => {
        document.getElementById(`error-${field}`).classList.add("hidden");
        document.getElementById(`form-${field}`).classList.remove("border-red-400");
      });
    }

    function renderFormOptions() {
      document.getElementById("form-categories").innerHTML = CATEGORIES.filter(c => c !== "All").map(cat => `<button type="button" id="form-cat-${cat}" onclick="selectFormCategory('${cat}')" class="px-3 py-1.5 text-xs font-medium rounded-lg border transition-all">${cat}</button>`).join('');
      document.getElementById("form-icons").innerHTML = ICON_OPTIONS.map(i => `<button type="button" id="form-icon-${i}" onclick="selectFormIcon('${i}')" class="w-8 h-8 rounded-lg flex items-center justify-center border transition-all"><i data-lucide="${i}" class="w-4 h-4"></i></button>`).join('');
      document.getElementById("form-colors").innerHTML = COLOR_OPTIONS.map(c => `<button type="button" id="form-color-${c.replace('#', '')}" onclick="selectFormColor('${c}')" class="w-7 h-7 rounded-md border-2 transition-all" style="background-color: ${c}; border-color: transparent;"></button>`).join('');
    }

    function selectFormCategory(cat) {
      form.category = cat;
      CATEGORIES.filter(c => c !== "All").forEach(c => {
        document.getElementById(`form-cat-${c}`).className = c === cat ? "px-3 py-1.5 text-xs font-medium rounded-lg border transition-all bg-primary text-primary-foreground border-primary" : "px-3 py-1.5 text-xs font-medium rounded-lg border transition-all bg-secondary text-muted-foreground border-border hover:text-foreground";
      });
      updatePreview();
    }

    function selectFormIcon(iconName) {
      form.iconName = iconName;
      ICON_OPTIONS.forEach(i => {
        document.getElementById(`form-icon-${i}`).className = i === iconName ? "w-8 h-8 rounded-lg flex items-center justify-center border transition-all bg-primary text-primary-foreground border-primary" : "w-8 h-8 rounded-lg flex items-center justify-center border transition-all bg-secondary text-muted-foreground border-border hover:text-foreground";
      });
      updatePreview();
    }

    function selectFormColor(color) {
      form.color = color;
      COLOR_OPTIONS.forEach(c => {
        const btn = document.getElementById(`form-color-${c.replace('#', '')}`);
        if (c === color) { btn.style.borderColor = "#0f172a"; btn.style.transform = "scale(1.1)"; } else { btn.style.borderColor = "transparent"; btn.style.transform = "none"; }
      });
      updatePreview();
    }

    function updatePreview() {
      form.title = document.getElementById("form-title").value;
      form.subtitle = document.getElementById("form-subtitle").value;
      form.targetUrl = document.getElementById("form-url").value;
      form.description = document.getElementById("form-description").value;
      document.getElementById("preview-title").innerText = form.title.trim() || "模組名稱";
      document.getElementById("preview-subtitle").innerText = form.subtitle.trim() || "中文名稱";
      document.getElementById("preview-category").innerText = form.category;
      const iw = document.getElementById("preview-icon-wrapper");
      iw.style.backgroundColor = `${form.color}18`; iw.style.color = form.color;
      document.getElementById("preview-icon").setAttribute("data-lucide", form.iconName);
      lucide.createIcons();
    }

    function handleSubmit() {
      clearErrors();
      let hasError = false;
      if (!form.title.trim()) { showFieldError("title", "請輸入模組名稱"); hasError = true; }
      if (!form.subtitle.trim()) { showFieldError("subtitle", "請輸入中文名稱"); hasError = true; }
      if (!form.targetUrl.trim()) { showFieldError("url", "請輸入連結網頁檔名"); hasError = true; }
      if (!form.description.trim()) { showFieldError("description", "請輸入說明"); hasError = true; }
      if (hasError) return;

      if (modalMode === "add") {
        const newPage = {
          id: Date.now(),
          slug: slugify(form.title) || `module-${Date.now()}`,
          title: form.title.trim(),
          subtitle: form.subtitle.trim(),
          description: form.description.trim(),
          category: form.category,
          iconName: form.iconName,
          color: form.color,
          targetUrl: form.targetUrl.trim() // 儲存使用者填寫的自訂檔名
        };
        pages.push(newPage);
      } else if (modalMode === "edit") {
        pages = pages.map(p => {
          if (p.id === editingId) {
            return {
              ...p,
              slug: slugify(form.title) || p.slug,
              title: form.title.trim(),
              subtitle: form.subtitle.trim(),
              description: form.description.trim(),
              category: form.category,
              iconName: form.iconName,
              color: form.color,
              targetUrl: form.targetUrl.trim() // 更新自訂檔名
            };
          }
          return p;
        });
      }

      localStorage.setItem("rel_modules", JSON.stringify(pages));
      closeModal();
      render();
    }

    function handleDelete(targetId) {
      const targetModule = pages.find(p => p.id === targetId);
      if (!targetModule) return;

      const confirmDelete = confirm(`您確定要刪除「${targetModule.title} (${targetModule.subtitle})」嗎？\n刪除後將無法還原。`);
      if (confirmDelete) {
        pages = pages.filter(p => p.id !== targetId);
        localStorage.setItem("rel_modules", JSON.stringify(pages));
        render();
      }
    }

    function showFieldError(field, msg) {
      const errorEl = document.getElementById(`error-${field}`);
      const inputEl = document.getElementById(`form-${field}`);
      errorEl.innerText = msg; errorEl.classList.remove("hidden");
      inputEl.classList.add("border-red-400");
    }
  </script>
</body>
</html>
