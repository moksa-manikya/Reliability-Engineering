<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>測試作業視窗</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-slate-50 min-h-screen text-slate-900 p-8">

  <div class="max-w-4xl mx-auto bg-white border border-slate-200 rounded-2xl p-8 shadow-sm">
    <a href="index.html" class="inline-flex items-center gap-2 text-sm text-slate-500 hover:text-slate-900 transition-colors mb-6">
      <i data-lucide="arrow-left" class="w-4 h-4"></i> 返回主平台
    </a>

    <div id="panel-content" class="hidden">
      <div class="flex items-center gap-4 mb-6">
        <div id="module-icon-box" class="w-14 h-14 rounded-xl flex items-center justify-center text-2xl font-bold">
          <i id="module-icon" class="w-8 h-8"></i>
        </div>
        <div>
          <div class="flex items-center gap-3">
            <h1 id="module-title" class="text-3xl font-bold tracking-tight">---</h1>
            <span id="module-category" class="text-xs px-2 py-0.5 rounded-md border bg-slate-100 text-slate-600 font-mono">---</span>
          </div>
          <p id="module-subtitle" class="text-slate-500 font-mono mt-0.5">---</p>
        </div>
      </div>

      <div class="bg-slate-50 border border-slate-200 rounded-xl p-5 mb-8">
        <h3 class="text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2 font-mono">測試模組說明</h3>
        <p id="module-description" class="text-slate-600 leading-relaxed font-light">---</p>
      </div>

      <div class="border-2 border-dashed border-slate-200 rounded-2xl p-12 text-center text-slate-400">
        <i data-lucide="activity" class="w-10 h-10 mx-auto mb-3 opacity-40"></i>
        <p class="text-sm">此處為 <span id="module-working-name" class="font-medium text-slate-600">---</span> 的正式工作數據與報告產出控制台</p>
      </div>
    </div>

    <div id="panel-error" class="hidden text-center py-12 text-slate-500">
      <i data-lucide="shield-alert" class="w-12 h-12 text-red-400 mx-auto mb-3"></i>
      <p class="text-lg font-semibold">找不到該測試項目</p>
      <p class="text-sm text-slate-400 mt-1">該模組可能已被移除或網址輸入錯誤。</p>
    </div>
  </div>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      // 1. 取得 URL 的參數 (?slug=xxx)
      const urlParams = new URLSearchParams(window.location.search);
      const slug = urlParams.get('slug');

      // 2. 從 LocalStorage 獲取對應的模組清單
      const pages = JSON.parse(localStorage.getItem("rel_modules")) || [];
      const currentModule = pages.find(p => p.slug === slug);

      if (currentModule) {
        // 3. 渲染對應的模組資料
        document.title = `${currentModule.title} - 可靠度測試工作區`;
        document.getElementById("module-title").innerText = currentModule.title;
        document.getElementById("module-subtitle").innerText = currentModule.subtitle;
        document.getElementById("module-description").innerText = currentModule.description;
        document.getElementById("module-category").innerText = currentModule.category;
        document.getElementById("module-working-name").innerText = currentModule.title;

        const iconBox = document.getElementById("module-icon-box");
        iconBox.style.backgroundColor = `${currentModule.color}18`;
        iconBox.style.color = currentModule.color;

        document.getElementById("module-icon").setAttribute("data-lucide", currentModule.iconName);
        document.getElementById("panel-content").classList.remove("hidden");
      } else {
        document.getElementById("panel-error").classList.remove("hidden");
      }

      lucide.createIcons();
    });
  </script>
</body>
</html>
